<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ottimo — Boshqaruv tizimi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#f0eff8;--text2:rgba(240,239,248,0.55);--text3:rgba(240,239,248,0.28);
  --accent:#7c6fff;--accent2:#a89eff;
  --green:#1D9E75;--red:#E24B4A;--amber:#BA7517;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.screen{display:none}
.screen.active{display:flex;flex-direction:column;min-height:100vh}

/* LOGIN */
#s-login{align-items:center;justify-content:center;padding:2rem}
.logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px;text-align:center;margin-bottom:4px}
.logo span{color:var(--accent2)}
.logo-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:2rem}
.login-box{background:var(--bg2);border:.5px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:360px}
.login-tabs{display:flex;gap:8px;margin-bottom:1.5rem}
.ltab{flex:1;padding:8px;border-radius:8px;border:.5px solid var(--border);background:none;cursor:pointer;font-size:13px;color:var(--text2);font-family:'DM Sans',sans-serif;transition:all .2s}
.ltab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.form-group{margin-bottom:1rem}
.form-label{font-size:12px;color:var(--text3);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em}
.form-input{width:100%;background:var(--bg3);border:.5px solid var(--border2);color:var(--text);border-radius:10px;padding:10px 14px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
.pin-row{display:flex;gap:8px;justify-content:center;margin:8px 0}
.pin-input{width:48px;height:52px;background:var(--bg3);border:.5px solid var(--border2);color:var(--text);border-radius:10px;font-size:22px;font-weight:700;text-align:center;outline:none;font-family:'Syne',sans-serif;transition:border-color .2s}
.pin-input:focus{border-color:var(--accent)}
.btn-primary{width:100%;background:var(--accent);border:none;color:#fff;border-radius:10px;padding:11px;cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;margin-top:.5rem;transition:opacity .2s}
.btn-primary:hover{opacity:.88}
.err-msg{font-size:12px;color:#ff8080;text-align:center;margin-top:.5rem;min-height:16px}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;background:var(--bg2);border-bottom:.5px solid var(--border);position:sticky;top:0;z-index:50}
.tbar-l{display:flex;align-items:center;gap:10px}
.tbar-logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-.5px}
.tbar-logo span{color:var(--accent2)}
.rbadge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px}
.logout-btn{background:none;border:.5px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;color:var(--text2)}
.logout-btn:hover{border-color:var(--border2);color:var(--text)}

/* LAYOUT */
.portal-main{display:flex;flex:1}
.sidebar{width:210px;background:var(--bg2);border-right:.5px solid var(--border);padding:1rem 0;flex-shrink:0}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:1rem 1.25rem .4rem;font-weight:500}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 1.25rem;cursor:pointer;font-size:13px;color:var(--text2);border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{color:var(--text);border-left-color:var(--accent2);background:var(--bg3)}
.nav-item i{font-size:17px}
.content{flex:1;padding:1.5rem;overflow-y:auto;max-width:900px}

/* CARDS */
.page-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.5px;margin-bottom:.25rem}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:1.5rem}
.card{background:var(--bg2);border:.5px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.card-title{font-size:14px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px}
.card-title i{color:var(--accent2)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1rem}
.metric{background:var(--bg2);border:.5px solid var(--border);border-radius:12px;padding:1rem}
.metric-lbl{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.metric-val{font-size:24px;font-weight:500}
.metric-sub{font-size:11px;color:var(--text2);margin-top:3px}

/* BADGE */
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:99px;font-weight:500}
.b-green{background:rgba(29,158,117,.15);color:#2dd4a0}
.b-red{background:rgba(226,75,74,.15);color:#ff8080}
.b-amber{background:rgba(186,117,23,.15);color:#f5a623}
.b-blue{background:rgba(124,111,255,.15);color:#a89eff}
.b-gray{background:rgba(255,255,255,.07);color:var(--text2)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:8px 10px;color:var(--text3);font-size:11px;font-weight:500;border-bottom:.5px solid var(--border)}
.tbl td{padding:10px 10px;border-bottom:.5px solid var(--border);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}

/* BTN */
.btn-sm{background:none;border:.5px solid var(--border2);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;color:var(--text2);display:inline-flex;align-items:center;gap:5px;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn-sm:hover{border-color:var(--accent);color:var(--accent2)}
.btn-accent{background:var(--accent);border:none;color:#fff;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif}
.btn-danger{background:rgba(226,75,74,.15);border:.5px solid rgba(226,75,74,.3);color:#ff8080;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif}
.btn-success{background:rgba(29,158,117,.15);border:.5px solid rgba(29,158,117,.3);color:#2dd4a0;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:5px;font-family:'DM Sans',sans-serif}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal{background:var(--bg2);border:.5px solid var(--border2);border-radius:16px;padding:1.5rem;width:min(460px,92vw);max-height:85vh;overflow-y:auto}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.5px;margin-bottom:1.25rem}
.modal-form .form-group{margin-bottom:.875rem}
.modal-form .form-label{font-size:12px;color:var(--text3);margin-bottom:5px;display:block}
.modal-form .form-input,.modal-form .form-select{width:100%;background:var(--bg3);border:.5px solid var(--border2);color:var(--text);border-radius:10px;padding:10px 14px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
.modal-form .form-select option{background:var(--bg2)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}

/* HISOBOT DETAIL */
.hd-section{margin-bottom:1rem}
.hd-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}
.hd-value{font-size:14px;color:var(--text);line-height:1.6}
.duty-line{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px}
.duty-line i{font-size:14px}

/* ISHCHI HISOBOT */
.step-dots{display:flex;gap:6px;margin-bottom:1.5rem}
.sdot{flex:1;height:4px;border-radius:2px;background:var(--border2);transition:background .3s}
.sdot.done{background:var(--accent)}
.sdot.active{background:var(--accent2)}
.chk{width:22px;height:22px;border-radius:6px;border:.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.chk.done{background:var(--green);border-color:var(--green);color:#fff}
.duty-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:.5px solid var(--border)}
.duty-item:last-child{border-bottom:none}
.duty-name{font-size:14px;color:var(--text);transition:color .2s}
.duty-name.done{text-decoration:line-through;color:var(--text3)}
.duty-time{font-size:11px;color:var(--text3);margin-top:2px}
.form-textarea{width:100%;background:var(--bg3);border:.5px solid var(--border2);color:var(--text);border-radius:10px;padding:10px 14px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;resize:vertical;min-height:80px;line-height:1.6}
.rating-row{display:flex;gap:8px}
.rating-btn{flex:1;background:var(--bg3);border:.5px solid var(--border2);color:var(--text2);border-radius:8px;padding:8px 4px;cursor:pointer;font-size:12px;text-align:center;transition:all .2s;font-family:'DM Sans',sans-serif}
.rating-btn.active{border-color:var(--accent);background:rgba(124,111,255,.15);color:var(--accent2)}
.prog-wrap{margin-bottom:1rem}
.prog-top{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px}
.prog-bar{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .4s}
.success-box{text-align:center;padding:2rem 1rem}
.success-icon{width:64px;height:64px;border-radius:50%;background:rgba(29,158,117,.15);display:flex;align-items:center;justify-content:center;font-size:32px;color:#2dd4a0;margin:0 auto 1rem}

@media(max-width:640px){.sidebar{display:none}.content{padding:1rem}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="s-login" class="screen active">
  <div class="logo">Ottimo <span>Tizim</span></div>

  <div class="login-box">
    <div class="login-tabs">
      <button class="ltab active" onclick="switchTab('admin')"><i class="ti ti-shield" style="font-size:13px;vertical-align:-1px"></i> Rahbar</button>

    </div>
    <div id="adminForm">
      <div class="form-group">
        <label class="form-label">Ismingiz</label>
        <input class="form-input" id="adminLogin" placeholder="Masalan: Sardor">
      </div>
      <div class="form-group">
        <label class="form-label">PIN kod (4 ta raqam)</label>
        <div class="pin-row">
          <input class="pin-input" id="p0" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(0)">
          <input class="pin-input" id="p1" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(1)">
          <input class="pin-input" id="p2" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(2)">
          <input class="pin-input" id="p3" maxlength="1" type="password" inputmode="numeric" oninput="pinNext(3)">
        </div>
      </div>
      <button class="btn-primary" onclick="loginAdmin()">Kirish</button>
      <div class="err-msg" id="adminErr"></div>
      
    </div>
    <div id="workerForm" style="display:none">
      <div class="form-group">
        <label class="form-label">Login (rahbar bergan)</label>
        <input class="form-input" id="workerLogin" placeholder="masalan: alisher_barista">
      </div>
      <div class="form-group">
        <label class="form-label">PIN kod</label>
        <div class="pin-row">
          <input class="pin-input" id="wp0" maxlength="1" type="password" inputmode="numeric" oninput="wPinNext(0)">
          <input class="pin-input" id="wp1" maxlength="1" type="password" inputmode="numeric" oninput="wPinNext(1)">
          <input class="pin-input" id="wp2" maxlength="1" type="password" inputmode="numeric" oninput="wPinNext(2)">
          <input class="pin-input" id="wp3" maxlength="1" type="password" inputmode="numeric" oninput="wPinNext(3)">
        </div>
      </div>
      <button class="btn-primary" onclick="loginWorker()">Kirish</button>
      <div class="err-msg" id="workerErr"></div>
    </div>
  </div>
</div>

<!-- ADMIN PORTAL -->
<div id="s-admin" class="screen">
  <div class="topbar">
    <div class="tbar-l">
      <div class="tbar-logo">Ottimo <span>Admin</span></div>
      <span class="rbadge" style="background:rgba(124,111,255,.2);color:#a89eff" id="adminNameBadge">Rahbar</span>
    </div>
    <button class="logout-btn" onclick="logout()"><i class="ti ti-logout" style="font-size:13px"></i> Chiqish</button>
  </div>
  <div class="portal-main">
    <div class="sidebar">
      <div class="nav-section">Boshqaruv</div>
      <div class="nav-item active" onclick="adminPage('dashboard')" id="anav_dashboard"><i class="ti ti-home"></i>Dashboard</div>
      <div class="nav-item" onclick="adminPage('reports')" id="anav_reports"><i class="ti ti-file-description"></i>Hisobotlar</div>
      <div class="nav-item" onclick="adminPage('workers')" id="anav_workers"><i class="ti ti-users"></i>Ishchilar</div>
      <div class="nav-item" onclick="adminPage('add_worker')" id="anav_add_worker"><i class="ti ti-user-plus"></i>Login yaratish</div>
    </div>
    <div class="content" id="adminContent"></div>
  </div>
</div>

<!-- WORKER PORTAL -->
<div id="s-worker" class="screen">
  <div class="topbar">
    <div class="tbar-l">
      <div class="tbar-logo">Ottimo <span>Hisobot</span></div>
      <span class="rbadge" id="workerBadge"></span>
    </div>
    <button class="logout-btn" onclick="logout()"><i class="ti ti-logout" style="font-size:13px"></i> Chiqish</button>
  </div>
  <div class="content" style="max-width:640px;margin:0 auto;padding:1.5rem" id="workerContent"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div id="modalContent"></div>
  </div>
</div>

}

// ══════════════════════════════
// LOGIN
// ══════════════════════════════
let currentTab = 'admin';
let currentWorker = null;

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('adminForm').style.display = tab==='admin'?'block':'none';
  document.getElementById('workerForm').style.display = tab==='worker'?'block':'none';
  document.querySelectorAll('.ltab').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='admin')||(i===1&&tab==='worker')));
}

function pinNext(i) {
  const v = document.getElementById('p'+i).value;
  if(v && i<3) document.getElementById('p'+(i+1)).focus();
}
function wPinNext(i) {
  const v = document.getElementById('wp'+i).value;
  if(v && i<3) document.getElementById('wp'+(i+1)).focus();
}

function getPin(prefix) {
  return [0,1,2,3].map(i=>document.getElementById(prefix+i).value).join('');
}

async function loginAdmin() {
  const pin = getPin('p');
  const login = document.getElementById('adminLogin').value.trim();
  const hashed = await hashPin(pin);

    setTimeout(()=>[0,1,2,3].forEach(i=>document.getElementById('p'+i).style.borderColor=''),1500);

}

async function loginWorker() {

function nwPinNext(i) {
  const v = document.getElementById('nw_p'+i).value;
  if(v && i<3) document.getElementById('nw_p'+(i+1)).focus();
}

function autoFill() {
  const name = document.getElementById('nw_name').value.trim();
  const role = document.getElementById('nw_role').value;
  if(name) {
    const first = name.split(' ')[0].toLowerCase();
    document.getElementById('nw_login').value = `${first}_${role}`;
  }
  const pin = Math.floor(1000+Math.random()*9000).toString();
  pin.split('').forEach((c,i)=>document.getElementById('nw_p'+i).value=c);
}

async function saveWorker() {
  const name   = document.getElementById('nw_name').value.trim();
  const role   = document.getElementById('nw_role').value;
  const filial = document.getElementById('nw_filial').value;
  const login  = document.getElementById('nw_login').value.trim().toLowerCase();
  const pin    = [0,1,2,3].map(i=>document.getElementById('nw_p'+i).value).join('');

  if(!name||!login||pin.length!==4) { document.getElementById('nwErr').textContent='Barcha maydonlarni to\'ldiring!'; return; }

  const d = loadData();
  if(d.workers.find(w=>w.login===login)) { document.getElementById('nwErr').textContent='Bu login allaqachon mavjud!'; return; }

  const pinHashed = await hashPin(pin);
  d.workers.push({id:'w'+Date.now(), login, pin:pinHashed, name, role, filial});
  saveData(d);

  openModal(`<div class="modal-title" style="color:#2dd4a0"><i class="ti ti-circle-check"></i> Yaratildi!</div>
    <div style="background:var(--bg3);border-radius:10px;padding:1rem;margin-bottom:1rem">
      <div style="font-size:13px;color:var(--text2);margin-bottom:8px">Ishchiga bering:</div>
      <div style="font-size:14px;margin-bottom:4px">👤 Ism: <b>${name}</b></div>
      <div style="font-size:14px;margin-bottom:4px">🔑 Login: <b style="color:#a89eff">${login}</b></div>
      <div style="font-size:14px">🔢 PIN: <b style="color:#2dd4a0">${pin}</b></div>
    </div>
    <button class="btn-accent" style="width:100%;justify-content:center" onclick="closeModal();adminPage('workers')">Ishchilar ro'yxatiga</button>`);
}

function deleteWorker(id) {
  if(!confirm('O\'chirishni tasdiqlaysizmi?')) return;
  const d = loadData();
  d.workers = d.workers.filter(w=>w.id!==id);
  saveData(d);
  adminPage('workers');

  const pin = [6,8,8,4,6,6].map(i=>document.getElementById('ep'+i).value).join('');

    extraHtml = `<div class="hd-section"><div class="hd-label">Ko'rsatkichlar</div>

    </div>

function updateReport(id, status) {

// ══════════════════════════════
// WORKER FLOW
// ══════════════════════════════
let workerStep = 0;
let workerDuties = {};
let workerForm = {};
let workerRating = null;

function startWorkerFlow() {
  workerStep = 0;
  workerDuties = {};
  DUTIES[currentWorker.role]?.forEach((_,i) => workerDuties[i]=false);
  workerForm = {};
  workerRating = null;
  renderWorkerStep();
}

const NOW = new Date();
const DATE = `${NOW.getDate().toString().padStart(2,'0')}.${(NOW.getMonth()+1).toString().padStart(2,'0')}.${NOW.getFullYear()}`;
const TIME = `${String(NOW.getHours()).padStart(2,'0')}:${String(NOW.getMinutes()).padStart(2,'0')}`;

function stepDots(active, total=3) {
  return `<div class="step-dots">${Array.from({length:total},(_,i)=>`<div class="sdot ${i<active?'done':i===active?'active':''}"></div>`).join('')}</div>`;
}

function renderWorkerStep() {
  const c = document.getElementById('workerContent');
  if(workerStep===0) c.innerHTML = renderWArrival();
  else if(workerStep===1) c.innerHTML = renderWDuties();
  else if(workerStep===2) c.innerHTML = renderWForm();
  else if(workerStep===3) c.innerHTML = renderWSuccess();
}

function renderWArrival() {
  const isLate = NOW.getHours()>9||(NOW.getHours()===9&&NOW.getMinutes()>5);
  return `${stepDots(0)}
  <div class="page-title">Salom, ${currentWorker.name.split(' ')[0]}!</div>
  <div class="page-sub">${DATE} · ${TIME}</div>
  <div class="card">
    <div class="card-title"><i class="ti ti-login"></i>Kelish vaqtini belgilang</div>
    <div class="form-group"><label class="form-label">Kelgan vaqt</label><input type="time" class="form-input" id="arrTime" value="${TIME}"></div>
    ${isLate?`<div style="background:rgba(226,75,74,.1);border:.5px solid rgba(226,75,74,.2);border-radius:10px;padding:10px 14px;font-size:13px;color:#ff8080;margin-bottom:1rem"><i class="ti ti-alert-circle" style="vertical-align:-2px"></i> Kech qolish sababi yozing</div>
    <div class="form-group"><label class="form-label">Sabab</label><input class="form-input" id="lateReason" placeholder="Transport muammosi..."></div>`:''}
  </div>
  <div style="display:flex;justify-content:flex-end">
    <button class="btn-accent" onclick="confirmArrival()"><i class="ti ti-arrow-right"></i> Davom etish</button>
  </div>`;
}

function confirmArrival() {
  workerForm.arriveTime = document.getElementById('arrTime').value;
  workerForm.filial = currentWorker.filial;
  const lr = document.getElementById('lateReason');
  workerForm.lateReason = lr ? lr.value : '';
  workerStep=1; renderWorkerStep();
}

function renderWDuties() {
  const duties = DUTIES[currentWorker.role]||[];
  const done = Object.values(workerDuties).filter(Boolean).length;
  const pct = duties.length ? Math.round(done/duties.length*100) : 0;
  return `${stepDots(1)}
  <div class="page-title">Bugungi vazifalar</div>
  <div class="page-sub">Bajargan vazifalarni belgilang</div>
  <div class="prog-wrap">
    <div class="prog-top"><span>Bajarilish</span><span id="pctLbl">${pct}%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="pf" style="width:${pct}%"></div></div>
  </div>
  <div class="card">
    ${duties.map((d,i)=>`
    <div class="duty-item" id="di${i}">
      <div class="chk ${workerDuties[i]?'done':''}" onclick="tDuty(${i})">${workerDuties[i]?'<i class="ti ti-check"></i>':''}</div>
      <div style="flex:1">
        <div class="duty-name ${workerDuties[i]?'done':''}">${d.n}</div>
        <div class="duty-time">${d.t} · <span class="badge ${d.p}" style="font-size:10px">${d.p==='b-red'?'Shoshilinch':d.p==='b-amber'?'Bugun':'Reja'}</span></div>
      </div>
    </div>`).join('')}
  </div>
  <div style="display:flex;justify-content:space-between">
    <button class="btn-sm" onclick="workerStep=0;renderWorkerStep()"><i class="ti ti-arrow-left"></i> Orqaga</button>
    <button class="btn-accent" onclick="workerStep=2;renderWorkerStep()">Hisobot <i class="ti ti-arrow-right"></i></button>
  </div>`;
}

function tDuty(i) {
  workerDuties[i]=!workerDuties[i];
  const chk=document.querySelector(`#di${i} .chk`), nm=document.querySelector(`#di${i} .duty-name`);
  if(chk){chk.classList.toggle('done',workerDuties[i]);chk.innerHTML=workerDuties[i]?'<i class="ti ti-check"></i>':'';}
  if(nm) nm.classList.toggle('done',workerDuties[i]);
  const done=Object.values(workerDuties).filter(Boolean).length;
  const total=DUTIES[currentWorker.role]?.length||1;
  const pct=Math.round(done/total*100);
  const pf=document.getElementById('pf'), pl=document.getElementById('pctLbl');
  if(pf)pf.style.width=pct+'%'; if(pl)pl.textContent=pct+'%';
}

function renderWForm() {
  const fields = EXTRA_FIELDS[currentWorker.role]||[];
  return `${stepDots(2)}
  <div class="page-title">Kunlik hisobot</div>
  <div class="page-sub">Smena natijalarini kiriting</div>
  <div class="card">
    ${fields.map(f=>`
    <div class="form-group">
      <label class="form-label">${f.label}</label>
      ${f.ta
        ? `<textarea class="form-textarea" id="ff_${f.id}" placeholder="${f.ph}"></textarea>`
        : `<input type="text" class="form-input" id="ff_${f.id}" placeholder="${f.ph}">`
      }
    </div>`).join('')}
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-star"></i>Smena bahosi</div>
    <div class="rating-row">
      <button class="rating-btn" id="rb1" onclick="setRating(1)">😞 Yomon</button>
      <button class="rating-btn" id="rb2" onclick="setRating(2)">😐 O'rtacha</button>
      <button class="rating-btn" id="rb3" onclick="setRating(3)">😊 Yaxshi</button>
      <button class="rating-btn" id="rb4" onclick="setRating(4)">🔥 A'lo</button>
    </div>
  </div>
  <div style="display:flex;justify-content:space-between">
    <button class="btn-sm" onclick="workerStep=1;renderWorkerStep()"><i class="ti ti-arrow-left"></i> Orqaga</button>
    <button class="btn-accent" onclick="submitReport()"><i class="ti ti-send"></i> Yuborish</button>
  </div>`;
}

function setRating(v) {
  workerRating=v;
  [1,2,3,4].forEach(i=>{const b=document.getElementById('rb'+i);if(b)b.classList.toggle('active',i===v);});
}

function submitReport() {
  const fields = EXTRA_FIELDS[currentWorker.role]||[];
  fields.forEach(f=>{const el=document.getElementById('ff_'+f.id);if(el)workerForm[f.id]=el.value;});

  const duties = DUTIES[currentWorker.role]||[];
  const dutyDone = Object.values(workerDuties).filter(Boolean).length;
  const dutyPct  = duties.length ? Math.round(dutyDone/duties.length*100) : 0;

  const extras = fields.filter(f=>workerForm[f.id]&&workerForm[f.id].toString().trim())
    .map(f=>({label:f.label, value:workerForm[f.id]}));

  const report = {
    id: 'r'+Date.now(),
    workerId: currentWorker.id,
    workerName: currentWorker.name,
    role: currentWorker.role,
    filial: currentWorker.filial,
    date: DATE,
    time: TIME,
    arriveTime: workerForm.arriveTime||TIME,
    lateReason: workerForm.lateReason||'',
    duties: duties.map((d,i)=>({n:d.n, done:!!workerDuties[i]})),
    dutyDone, dutyTotal:duties.length, dutyPct,
    extras,
    rating: workerRating,
    status: 'pending'
  };

  const d = loadData();
  d.reports.push(report);
  saveData(d);

  workerStep=3; renderWorkerStep();
}

function renderWSuccess() {
  const ratingEmoji = ['','😞','😐','😊','🔥'];
  const ratingText  = ['','Yomon',"O'rtacha",'Yaxshi',"A'lo"];
  return `${stepDots(3)}
  <div class="success-box">
    <div class="success-icon"><i class="ti ti-circle-check"></i></div>
    <div class="page-title">Hisobot yuborildi!</div>
    <div style="font-size:14px;color:var(--text2);margin:.75rem 0 1.5rem;line-height:1.6">Rahbaringiz ko'rib chiqib tasdiqlaydi.<br>Yaxshi ish, ${currentWorker.name.split(' ')[0]}! 👏</div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-list-check"></i>Xulosa</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:.5px solid var(--border)"><span style="color:var(--text3)">Ism</span><span>${currentWorker.name}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:.5px solid var(--border)"><span style="color:var(--text3)">Filial</span><span>${currentWorker.filial}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:.5px solid var(--border)"><span style="color:var(--text3)">Kelish</span><span>${workerForm.arriveTime}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:.5px solid var(--border)"><span style="color:var(--text3)">Vazifalar</span><span>${Object.values(workerDuties).filter(Boolean).length}/${DUTIES[currentWorker.role]?.length||0}</span></div>
      ${workerRating?`<div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0"><span style="color:var(--text3)">Smena</span><span>${ratingEmoji[workerRating]} ${ratingText[workerRating]}</span></div>`:''}
    </div>
  </div>
  <div style="text-align:center;margin-top:1rem">
    <button class="btn-sm" onclick="logout()"><i class="ti ti-home"></i> Chiqish</button>
  </div>`;
}

// ══════════════════════════════
// MODAL
// ══════════════════════════════
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal(e) {
  if(!e || e.target===document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('active');
  }
}
</script>
</body>
</html>
